  set: async (p,d) => { try{await fetch(`${DB_URL}/${p}.json`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)})}catch{} },
  patch: async (p,d) => { try{await fetch(`${DB_URL}/${p}.json`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)})}catch{} },
  del: async p => { try{await fetch(`${DB_URL}/${p}.json`,{method:"DELETE"})}catch{} }
};

const sign = (h,a) => {
  if(h===""||a===""||h===undefined||a===undefined) return null;
  return +h>+a?"1":+h<+a?"2":"X";
};

const calcScore = (p,r) => {
  if(!p||!r) return 0; let s=0;
  ALL_MATCHES.forEach(({id})=>{const pm=p.matches?.[id],rm=r.matches?.[id];if(!pm||!rm||rm.h===undefined)return;if(+pm.h===+rm.h&&+pm.a===+rm.a)s+=4;else if(sign(pm.h,pm.a)===sign(rm.h,rm.a))s+=2;});
  const ra=new Set(r.advancement||[]);(p.advancement||[]).forEach(t=>ra.has(t)&&s++);
  [["r32",1],["r16",2],["qf",3],["sf",4]].forEach(([rnd,pts])=>{const rs=new Set(r[rnd]||[]);(p[rnd]||[]).forEach(t=>rs.has(t)&&(s+=pts));});
  if(p.champion&&p.champion===r.champion)s+=8;
  // Maalipörssi: 8/4/2 oikealla sijalla, 1 väärällä sijalla
  if(p.topScorers&&r.topScorers){
    const pts=[8,4,2];
    [0,1,2].forEach(i=>{
      if(p.topScorers[i]&&r.topScorers[i]===p.topScorers[i]) s+=pts[i];
      else if(p.topScorers[i]&&r.topScorers.includes(p.topScorers[i])) s+=1;
    });
  }
  return s;
};

function renderLohko(matchesDone, locked) {
  const s = state;
  const groupMatches = ALL_MATCHES.filter(m=>m.group===s.group);

  return `
    <div>
      <div style="margin-bottom:20px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;color:var(--color-text-secondary)">

        </div>
        <div style="background:var(--color-background-tertiary);border-radius:4px;height:4px">
          <div style="width:${Math.round((matchesDone/72)*100)}%;height:4px;border-radius:4px;background:var(--color-text-success);transition:width .4s"></div>
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">

      <div style="margin-bottom:12px">
        <span style="font-size:15px;font-weight:500">Lohko ${s.group}</span>
        <span style="font-size:12px;color:var(--color-text-tertiary);margin-left:10px">${grpTeams}</span>
      </div>
      ${groupMatches.map(m=>{
        const mp=s.preds.matches?.[m.id]||{};
        const sg=sign(mp.h,mp.a);
        const done=mp.h!==undefined&&mp.a!==undefined&&mp.h!==""&&mp.a!=="";
        return `
        <div class="match-row${done?" done":""}">
          <span style="font-size:18px;min-width:22px">${FLAGS[m.home]}</span>
          <span style="flex:1;font-size:13px;text-align:right;color:var(--color-text-primary)">${m.home} <span style="font-size:9px;color:var(--color-text-tertiary)">#${teamRank(m.home)}</span>${teamStar(m.home)?` <span class="star-mark">⭐</span>`:""}</span>
          <div style="display:flex;align-items:center;gap:5px">
            <input type="number" min="0" max="20" step="1" class="score-inp" ${locked?"disabled":""} value="${mp.h??""}" oninput="updateMatch('${m.id}','h',this.value)" style="width:44px;height:40px"/>
            <div class="sign-badge${sg?` sign-${sg}`:""}">${sg||"–"}</div>
            <input type="number" min="0" max="20" step="1" class="score-inp" ${locked?"disabled":""} value="${mp.a??""}" oninput="updateMatch('${m.id}','a',this.value)" style="width:44px;height:40px"/>
          </div>
          <span style="flex:1;font-size:13px;color:var(--color-text-primary)">${teamStar(m.away)?`<span class="star-mark">⭐</span> `:""}<span style="font-size:9px;color:var(--color-text-tertiary)">#${teamRank(m.away)}</span> ${m.away}</span>
          <span style="font-size:18px;min-width:22px;text-align:right">${FLAGS[m.away]}</span>
        </div>`;
      }).join("")}
      <div style="margin-top:14px;padding:10px 14px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:12px;color:var(--color-text-secondary)">

        <br><span style="font-size:11px;color:var(--color-text-tertiary)">⭐ = FIFA-rankingin top 4 · #N = joukkueen sijoitus FIFA-listalla</span>

            <div class="danger-box">
              <p style="font-size:13px;color:var(--color-text-danger);margin-bottom:10px;line-height:1.5"><strong>Vaihe 2/3:</strong> Kirjoita käyttäjän nimi <strong>"${u.name}"</strong> vahvistaaksesi.</p>
              <input type="text" placeholder="Kirjoita nimi tähän" value="${s.deleteConfirmName||""}" oninput="state.deleteConfirmName=this.value; render()" style="width:100%;padding:8px 12px;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;margin-bottom:10px;font-family:var(--font-sans);box-sizing:border-box;color:var(--color-text-primary)"/>
              <div style="display:flex;gap:8px">
                <button onclick="deleteUserCancel()" class="btn-secondary">Peruuta</button>
                <button onclick="deleteUserConfirm()" ${s.deleteConfirmName!==u.name?"disabled":""} class="btn-danger">Vahvista (vaihe 3/3)</button>
              </div>
            </div>
          `:""}
        `;}).join("")}</div>
      `:`<p style="font-size:12px;color:var(--color-text-tertiary);padding:20px;text-align:center">Klikkaa "Lataa käyttäjälista" nähdäksesi käyttäjät.</p>`}
    </div>
  `;
}

// ═══════════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════════
window.setTab   = t => { state.tab=t; render(); if(t==="taulu") loadBoard(); };
window.setGroup = g => { state.group=g; render(); };
window.setAdminGrp = g => { state.adminGrp=g; render(); };

window.doLogin = async () => {
  if(!state.nameInput.trim()) return;
  const uid = `u_${Date.now()}`;
  try{ await window.storage.set("wc26_uid",uid); await window.storage.set("wc26_name",state.nameInput.trim()); }catch{}
  await fb.set(`predictions/${uid}`,{...EMPTY(),name:state.nameInput.trim()});
  state.userId=uid; state.userName=state.nameInput.trim(); render();
};

window.updateMatch = (id,field,val) => {
  if(isLocked()) return;
  const np={...state.preds,matches:{...state.preds.matches,[id]:{...state.preds.matches[id],[field]:val}}};
  state.preds=np; render(); scheduleSave(np);
};

window.toggleList = (key,team,max) => {
  if(isLocked()) return;
  const cur=state.preds[key]||[];
  const upd=cur.includes(team)?cur.filter(t=>t!==team):cur.length<max?[...cur,team]:cur;
  const np={...state.preds,[key]:upd}; state.preds=np; render(); scheduleSave(np);
};

window.setChamp = team => {
  if(isLocked()) return;
  const np={...state.preds,champion:state.preds.champion===team?"":team};
  state.preds=np; render(); scheduleSave(np);
};

window.setTopScorer = (idx, player) => {
  if(isLocked()) return;
  const ts=[...(state.preds.topScorers||["","",""])];
  ts[idx]=player;
  const np={...state.preds, topScorers: ts};
  state.preds=np; render(); scheduleSave(np);
};

window.loadBoard = async () => {
  state.boardLoading=true; render();
  const [allPreds,res]=await Promise.all([fb.get("predictions"),fb.get("results")]);
  if(allPreds){ state.board=Object.entries(allPreds).map(([uid,p])=>({name:p.name||"?",score:calcScore(p,res||{}),uid})).sort((a,b)=>b.score-a.score); }
  state.boardLoading=false; render();
};

window.tryAdminOpen = () => { if(state.adminPw===ADMIN_PW){state.adminOpen=true;} render(); };
window.adminUpdateMatch = (id,field,val) => { state.adminRes={...state.adminRes,matches:{...state.adminRes.matches,[id]:{...state.adminRes.matches?.[id],[field]:val}}}; render(); };
window.adminToggle = (key,team,max) => { const cur=state.adminRes[key]||[]; const sel=cur.includes(team); if(!sel&&cur.length>=max) return; state.adminRes={...state.adminRes,[key]:sel?cur.filter(t=>t!==team):[...cur,team]}; render(); };
window.adminSetChamp = team => { state.adminRes={...state.adminRes,champion:state.adminRes.champion===team?"":team}; render(); };
window.adminSetTopScorer = (idx, player) => {
  const ts=[...(state.adminRes.topScorers||["","",""])];
  ts[idx]=player;
  state.adminRes={...state.adminRes, topScorers: ts};
  render();
};
window.adminSaveAll = async () => { state.adminSaving=true; render(); await fb.set("results",state.adminRes); state.results={...state.adminRes}; state.adminSaving=false; render(); };

// Käyttäjien hallinta
window.loadUsers = async () => {
  const allPreds = await fb.get("predictions");
  if(allPreds){
    state.usersList = Object.entries(allPreds).map(([uid,p])=>({
      uid,
      name: p.name||"?",
      matchCount: Object.values(p.matches||{}).filter(m=>m.h!==undefined&&m.h!=="").length,
      champion: p.champion||""
    })).sort((a,b)=>a.name.localeCompare(b.name));
  } else {
    state.usersList = [];
  }
  render();
};

window.deleteUserStep1 = (uid) => {
  state.deleteStep = 1;
  state.deleteUid = uid;
  state.deleteConfirmName = "";
  render();
};

window.deleteUserStep2 = () => {
  state.deleteStep = 2;
  state.deleteConfirmName = "";
  render();
};

window.deleteUserCancel = () => {
  state.deleteStep = 0;
  state.deleteUid = null;
  state.deleteConfirmName = "";
  render();
};

window.deleteUserConfirm = async () => {
  const user = state.usersList.find(u=>u.uid===state.deleteUid);
  if(!user || state.deleteConfirmName !== user.name) return;
  await fb.del(`predictions/${state.deleteUid}`);
  state.deleteStep = 0;
  state.deleteUid = null;
  state.deleteConfirmName = "";
  await window.loadUsers();
};

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
(async()=>{
  try{
    const uid=await window.storage.get("wc26_uid");
    const uname=await window.storage.get("wc26_name");
    if(uid?.value&&uname?.value){
      state.userId=uid.value; state.userName=uname.value;
      const data=await fb.get(`predictions/${uid.value}`);
      if(data) state.preds={...EMPTY(),...data};
    }
  }catch{}
  const res=await fb.get("results");
  if(res){state.results={...EMPTY(),...res};state.adminRes={...EMPTY(),...res};}
  state.loading=false; render();
})();

// Mount the app container
function App() {
  return React.createElement('div', {id: 'app-root'});
}

// localStorage polyfill for non-Claude environments
if (typeof window.storage === 'undefined') {
  try {
    const _ls = window.localStorage;
    window.storage = {
      get: async (k) => { const v=_ls.getItem(k); if(v===null) throw new Error("not found"); return {value:v}; },
      set: async (k,v) => { _ls.setItem(k,String(v)); return {key:k,value:v}; },
      delete: async (k) => { _ls.removeItem(k); return {key:k,deleted:true}; }
    };
  } catch(e) {
    const _store = {};
    window.storage = {
      get: async (k) => { if(_store[k]===undefined) throw new Error("not found"); return {value:_store[k]}; },
      set: async (k,v) => { _store[k]=v; return {key:k,value:v}; },
      delete: async (k) => { delete _store[k]; return {key:k,deleted:true}; }
    };
  }
}

const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(App));
</script>
</body>
</html>
