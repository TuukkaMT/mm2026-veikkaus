      --pitch-green-dark:#1b5e20;
      --pitch-green-light:#43a047;
      --gold:#f4c430;
      --gold-dark:#c79c00;
      --color-background-primary:#ffffff;
      --color-background-secondary:#f5f5f5;
      --color-background-tertiary:#ebebeb;
      --color-background-success:#e8f5e9;
      --color-background-warning:#fff8e1;
      --color-background-danger:#ffebee;
      --color-background-info:#e3f2fd;
      --color-text-primary:#1a1a1a;
      --color-text-secondary:#555555;
      --color-text-tertiary:#999999;
      --color-text-success:#2e7d32;
      --color-text-warning:#e65100;
      --color-text-danger:#c62828;
      --color-text-info:#1565c0;
      --color-border-tertiary:rgba(0,0,0,0.10);
      --color-border-secondary:rgba(0,0,0,0.18);
      --color-border-primary:rgba(0,0,0,0.30);
      --color-border-success:#a5d6a7;
      --color-border-warning:#ffcc02;
      --color-border-danger:#ef9a9a;
      --color-border-info:#90caf9;
      --border-radius-md:8px;
      --border-radius-lg:12px;
      --border-radius-xl:16px;
    }
    @media(prefers-color-scheme:dark){
      :root{
        --color-background-primary:#1a2e1d;
        --color-background-secondary:#243627;
        --color-background-tertiary:#2d4030;
        --color-background-success:#1b3a1e;
        --color-background-warning:#3a2800;
        --color-background-danger:#3a1414;
        --color-background-info:#0d2840;
        --color-text-primary:#f0f0f0;
        --color-text-secondary:#aaaaaa;
        --color-text-tertiary:#777777;
        --color-text-success:#81c784;
        --color-text-warning:#ffb74d;
        --color-text-danger:#ef9a9a;
        --color-text-info:#64b5f6;
        --color-border-tertiary:rgba(255,255,255,0.10);
        --color-border-secondary:rgba(255,255,255,0.18);
        --color-border-primary:rgba(255,255,255,0.30);
      }
      body{background:#0d1a10}
    }
    input[type=number]{-moz-appearance:textfield}
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    .hero{background:linear-gradient(135deg,#1b5e20 0%,#2e7d32 50%,#1b5e20 100%);color:#fff;padding:24px 20px 18px;text-align:center;position:relative;overflow:hidden;border-bottom:3px solid var(--gold)}
    .hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 15% 50%,rgba(244,196,48,0.18) 0%,transparent 35%),radial-gradient(circle at 85% 30%,rgba(255,255,255,0.08) 0%,transparent 40%),repeating-linear-gradient(90deg,transparent,transparent 80px,rgba(255,255,255,0.04) 80px,rgba(255,255,255,0.04) 81px);pointer-events:none}
    .hero-content{position:relative;z-index:1}
    .hero-ball{font-size:32px;display:block;margin-bottom:4px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
    .hero-title{font-family:var(--font-sport);font-size:32px;font-weight:700;letter-spacing:3px;text-transform:uppercase;line-height:1;text-shadow:0 2px 4px rgba(0,0,0,0.2)}
    .hero-title .gold-text{color:var(--gold)}
    .hero-subtitle{font-family:var(--font-sport);font-size:11px;letter-spacing:4px;opacity:0.85;text-transform:uppercase;margin-top:6px;font-weight:500}
    .hero-user{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding:8px 14px;background:rgba(0,0,0,0.25);border-radius:var(--border-radius-md);backdrop-filter:blur(10px)}
    .hero-user-name{font-size:13px;font-weight:500;letter-spacing:0.5px}
    .hero-user-save{font-size:11px;opacity:0.9}
    .tab-bar{display:flex;border-bottom:1px solid var(--color-border-tertiary);position:sticky;top:0;z-index:99;background:var(--color-background-primary);overflow-x:auto;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
    .tab-btn{flex:1 0 auto;padding:13px 12px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:500;color:var(--color-text-secondary);border-bottom:3px solid transparent;white-space:nowrap;font-family:var(--font-sport);letter-spacing:1px;text-transform:uppercase;transition:all 0.2s}
    .tab-btn:hover{color:var(--color-text-primary);background:var(--color-background-secondary)}
    .tab-btn.active{color:var(--pitch-green);border-bottom-color:var(--pitch-green);font-weight:700}
    .chip-base{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--color-background-secondary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;font-size:12px;color:var(--color-text-secondary);font-family:var(--font-sans);overflow:hidden;white-space:nowrap;transition:all 0.15s}
    .chip-base:hover:not(:disabled){border-color:var(--pitch-green-light);transform:translateY(-1px)}
    .chip-base span.team-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-align:left}
    .chip-base .rank-tag{font-size:9px;color:var(--color-text-tertiary);margin-left:auto;font-weight:400}
    .chip-sel-s{background:linear-gradient(135deg,#43a047 0%,#2e7d32 100%)!important;border:1px solid #1b5e20!important;color:#fff!important;font-weight:500}
    .chip-sel-s .rank-tag{color:rgba(255,255,255,0.7)!important}
    .chip-sel-w{background:linear-gradient(135deg,#f4c430 0%,#c79c00 100%)!important;border:1px solid #8a6d00!important;color:#1a1a1a!important;font-weight:600}
    .chip-sel-w .rank-tag{color:rgba(0,0,0,0.6)!important}
    .chip-base:disabled{cursor:not-allowed}
    .chip-consensus{border:1px solid var(--gold)!important;background:rgba(244,196,48,0.1)!important;cursor:default}
    .match-row{background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-left:3px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:6px;transition:border-color 0.2s}
    .match-row.done{border-left-color:var(--pitch-green)}
    .sign-badge{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:var(--border-radius-md);font-family:var(--font-sport);font-size:13px;font-weight:700;background:var(--color-background-tertiary);color:var(--color-text-tertiary)}
    .sign-1{background:var(--pitch-green);color:#fff}
    .sign-X{background:var(--gold);color:#1a1a1a}
    .sign-2{background:#d32f2f;color:#fff}
    .score-inp{width:46px;height:42px;text-align:center;font-size:20px;font-weight:700;font-family:var(--font-sport);background:#0a0a0a;color:var(--gold);border:2px solid #2a2a2a;border-radius:var(--border-radius-md);transition:all 0.2s}

    .score-inp:disabled{opacity:0.4;cursor:not-allowed}

    .grp-btn{width:38px;height:38px;border:1.5px solid var(--color-border-tertiary);border-radius:50%;background:var(--color-background-primary);cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-sport);color:var(--color-text-secondary);transition:all 0.15s}
    .grp-btn:hover{border-color:var(--pitch-green-light);color:var(--color-text-primary)}
    .grp-btn.active{background:linear-gradient(135deg,var(--pitch-green-light) 0%,var(--pitch-green-dark) 100%);border-color:var(--pitch-green-dark);color:#fff;font-weight:700;transform:scale(1.05)}

    .sec-title{font-family:var(--font-sport);font-size:13px;font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:1.5px;margin:20px 0 10px;display:flex;align-items:center;gap:8px}

    .btn-secondary{padding:8px 16px;background:none;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);color:var(--color-text-primary);font-size:12px;cursor:pointer;font-family:var(--font-sans)}

    .pop-bar{background:var(--color-background-tertiary);width:60px;height:6px;border-radius:3px;overflow:hidden}
    .pop-bar-fill{height:100%;background:var(--pitch-green)}
    .pop-bar-fill.gold{background:var(--gold)}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(46,125,50,0.5)}50%{box-shadow:0 0 0 8px rgba(46,125,50,0)}}
  </style>

};

const sign = (h,a) => { if(h===""||a===""||h===undefined||a===undefined) return null; return +h>+a?"1":+h<+a?"2":"X"; };

const calcScore = (p,r) => {
  if(!p||!r) return 0; let s=0;
  ALL_MATCHES.forEach(({id})=>{const pm=p.matches?.[id],rm=r.matches?.[id];if(!pm||!rm||rm.h===undefined)return;if(+pm.h===+rm.h&&+pm.a===+rm.a)s+=5;else if(sign(pm.h,pm.a)===sign(rm.h,rm.a))s+=2;});
  const ra=new Set(r.advancement||[]);(p.advancement||[]).forEach(t=>ra.has(t)&&(s+=2));
  [["r32",4],["r16",6],["qf",8],["sf",10]].forEach(([rnd,pts])=>{const rs=new Set(r[rnd]||[]);(p[rnd]||[]).forEach(t=>rs.has(t)&&(s+=pts));});
  if(p.bronzeWinner&&p.bronzeWinner===r.bronzeWinner)s+=8;
  if(p.champion&&p.champion===r.champion)s+=12;
  if(p.topScorers&&r.topScorers){
    const posPts=[8,4,2];
    const goalPts=[5,3,1];
    [0,1,2].forEach(i=>{
      const player = p.topScorers[i]; if(!player) return;
      let playerInTop3 = false;
      if(r.topScorers[i]===player){ s+=posPts[i]; playerInTop3=true; }
      else if(r.topScorers.includes(player)){ s+=1; playerInTop3=true; }
      if(playerInTop3 && p.topScorerGoals && p.topScorerGoals[i]!==""&&p.topScorerGoals[i]!==null&&p.topScorerGoals[i]!==undefined){
        const actualIdx = r.topScorers.indexOf(player);
        const actualGoals = r.topScorerGoals?.[actualIdx];
        if(actualGoals!==""&&actualGoals!==null&&actualGoals!==undefined){
          const diff = Math.abs(+p.topScorerGoals[i] - +actualGoals);
          if(diff===0) s+=goalPts[i]; else if(diff===1) s+=1;
        }
      }
    });
  }
  return s;
};

const scheduleSave = (np) => {
  state.saveStatus="saving"; render();
  clearTimeout(state.saveTimer);
  state.saveTimer = setTimeout(async()=>{
    if(state.userId){ await fb.patch(`predictions/${state.userId}`,np); state.saveStatus="saved"; render(); setTimeout(()=>{state.saveStatus="idle";render();},2500); }
  },900);
};

const countTopScorerPicks = (idx) => {
  const counts = {};
  state.allPreds.forEach(p => { const pl=p.topScorers?.[idx]; if(pl) counts[pl]=(counts[pl]||0)+1; });
  return counts;
};
const countMatchPicks = (matchId) => {
  const counts = {"1":0,"X":0,"2":0}; let total=0;
  state.allPreds.forEach(p => {
    const m=p.matches?.[matchId];
    if(m && m.h!==""&&m.h!==undefined){
      const sg = sign(m.h,m.a);
      if(sg){ counts[sg]++; total++; }
    }
  });
  return {counts, total};
};

function renderVeikkaukset() {
  const s = state;
  if(s.allPredsLoading){ return `<div style="text-align:center;padding:40px;color:var(--color-text-tertiary)">Ladataan veikkauksia...</div>`; }
  if(s.allPreds.length === 0){ return `<div style="text-align:center;padding:40px;color:var(--color-text-tertiary)">Ei vielä veikkauksia.</div>`; }
  return `
    <div>
      <div style="display:flex;gap:6px;margin-bottom:16px;align-items:center">
        <button onclick="setVeikkausSubtab('pelaajat')" class="subtab-btn ${s.veikkausSubtab==='pelaajat'?'active':''}"><i class="ti ti-user" style="margin-right:4px"></i>Pelaajan mukaan</button>
        <button onclick="setVeikkausSubtab('otteluittain')" class="subtab-btn ${s.veikkausSubtab==='otteluittain'?'active':''}"><i class="ti ti-list" style="margin-right:4px"></i>Otteluittain</button>
        <button onclick="loadAllPreds()" class="btn-secondary" style="margin-left:auto" title="Päivitä"><i class="ti ti-refresh"></i></button>
      </div>
      <p style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:14px;line-height:1.5"><strong style="color:var(--color-text-secondary)">👑 = konsensus</strong> (vähintään 60% veikkasi näin). Sininen viiva = sinun veikkauksesi.</p>
      ${s.veikkausSubtab === 'pelaajat' ? renderByPlayer() : renderByMatch()}
    </div>
  `;
}

function renderByPlayer() {
  const s = state;
  const selected = s.allPreds.find(p => p.uid === s.selectedPlayerId) || s.allPreds[0];
  if(!selected) return '';
  const total = s.allPreds.length;
  const advCounts = countPicksInList('advancement');
  const champCounts = countChampionPicks();
  const champCount = champCounts[selected.champion] || 0;
  const tsCounts = [0,1,2].map(i => countTopScorerPicks(i));

  return `
    <div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px">
        ${s.allPreds.map(p => `
          <button onclick="selectPlayer('${p.uid}')" class="chip-base${selected.uid===p.uid?' chip-sel-s':''}" style="padding:8px 12px">
            ${p.uid===s.userId?'👤 ':''}${p.name||'?'}
          </button>
        `).join('')}
      </div>

      <div class="player-header">
        <h3 style="font-family:var(--font-sport);font-size:22px;font-weight:700;letter-spacing:1px;margin-bottom:2px">${selected.name}</h3>
        <p style="font-size:11px;opacity:0.9;letter-spacing:1.5px;text-transform:uppercase">Veikkaukset</p>
      </div>

      <div class="sec-title">Otteluveikkaukset</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">
        ${"ABCDEFGHIJKL".split("").map(g=>`<button onclick="setGroup('${g}')" class="grp-btn${s.group===g?' active':''}">${g}</button>`).join("")}
      </div>
      ${ALL_MATCHES.filter(m=>m.group===s.group).map(m => {
        const mp = selected.matches?.[m.id];
        const hasPred = mp?.h!==undefined&&mp.h!=="";
        const sg = hasPred ? sign(mp.h, mp.a) : null;
        const cons = countMatchPicks(m.id);
        const consSign = Object.entries(cons.counts).sort((a,b)=>b[1]-a[1])[0]?.[0];
        const consCount = cons.counts[consSign];
        const consMatch = sg && sg === consSign && consCount >= cons.total * 0.6;
        return `
          <div class="match-row${hasPred?" done":""}" style="opacity:${hasPred?1:0.4}">
            <span style="font-size:18px;min-width:22px">${FLAGS[m.home]}</span>
            <span style="flex:1;font-size:12px;text-align:right">${m.home}</span>
            <div style="display:flex;align-items:center;gap:5px">
              ${hasPred?`<span class="score-display">${mp.h}-${mp.a}</span><div class="sign-badge sign-${sg}">${sg}</div>`:`<span style="color:var(--color-text-tertiary);font-size:12px">—</span>`}
            </div>
            <span style="flex:1;font-size:12px">${m.away}</span>
            <span style="font-size:18px;min-width:22px;text-align:right">${FLAGS[m.away]}</span>
          </div>
          ${hasPred && cons.total>0 ? `
            <div style="font-size:10px;color:var(--color-text-tertiary);text-align:right;margin:-2px 10px 6px;padding-right:30px">
              Konsensus: <strong>${consSign}</strong> ${cons.counts[consSign]}/${cons.total}${consMatch?' <span style="color:var(--gold)">👑 sama</span>':''}
            </div>
          ` : ''}
        `;
      }).join('')}

      <div class="sec-title">Jatkoonpääsy <span class="badge">${(selected.advancement||[]).length}/32</span></div>
      <div class="team-grid" style="margin-bottom:14px">
        ${(selected.advancement||[]).length===0?`<div style="font-size:12px;color:var(--color-text-tertiary);grid-column:1/-1;padding:10px">Ei valintoja</div>`:(selected.advancement||[]).map(team => {
          const c = advCounts[team] || 0;
          const isCons = c >= total * 0.6;
          return `<div class="chip-base${isCons?' chip-consensus':''}" style="cursor:default">
            <span>${FLAGS[team]}</span><span class="team-text">${team}</span>
            <span class="rank-tag">${c}/${total}${isCons?' 👑':''}</span>
          </div>`;
        }).join('')}
      </div>

      ${[
        {key:"r32",label:"Kahdeksasfinaalit (R32)",max:16},
        {key:"r16",label:"Kuudestoistafinaalit (R16)",max:8},
        {key:"qf",label:"Neljännesfinaalit (QF)",max:4},
        {key:"sf",label:"Finalistit",max:2}
      ].map(({key,label,max}) => {
        const teams = selected[key] || [];
        const counts = countPicksInList(key);
        return `
          <div class="sec-title">${label} <span class="badge">${teams.length}/${max}</span></div>
          <div class="team-grid" style="margin-bottom:14px">
            ${teams.length===0?`<div style="font-size:12px;color:var(--color-text-tertiary);grid-column:1/-1;padding:10px">Ei valintoja</div>`:teams.map(team => {
              const c = counts[team] || 0;
              const isCons = c >= total * 0.6;
              return `<div class="chip-base${isCons?' chip-consensus':''}" style="cursor:default">
                <span>${FLAGS[team]}</span><span class="team-text">${team}</span>
                <span class="rank-tag">${c}/${total}${isCons?' 👑':''}</span>
              </div>`;
            }).join('')}
          </div>
        `;
      }).join('')}

      <div style="margin-top:20px;padding:16px;background:linear-gradient(135deg,rgba(205,127,50,0.1) 0%,rgba(205,127,50,0.02) 100%);border:1px solid #cd7f32;border-radius:var(--border-radius-lg)">
        <div class="sec-title" style="margin-top:0"><span style="font-size:16px">🥉</span>PRONSSIOTTELUN VOITTAJA</div>
        <div style="font-size:16px;font-weight:600;font-family:var(--font-sport);letter-spacing:1px">${selected.bronzeWinner ? `${FLAGS[selected.bronzeWinner]||""} ${selected.bronzeWinner}` : '<span style="color:var(--color-text-tertiary);font-size:14px">— ei valittu —</span>'}</div>
        ${selected.bronzeWinner ? (() => { const bc=countBronzePicks(); const bn=bc[selected.bronzeWinner]||0; return bn>0?`<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:6px">${bn}/${total} veikkasi näin${bn>=total*0.4?' 👑 konsensus':''}</div>`:''; })() : ''}
      </div>

      <div style="margin-top:14px;padding:16px;background:linear-gradient(135deg,rgba(244,196,48,0.1) 0%,rgba(244,196,48,0.02) 100%);border:1px solid var(--color-border-warning);border-radius:var(--border-radius-lg)">
        <div class="sec-title" style="margin-top:0"><i class="ti ti-trophy" style="font-size:16px;color:var(--gold)"></i>MESTARI</div>
        <div style="font-size:18px;font-weight:600;font-family:var(--font-sport);letter-spacing:1px">${selected.champion ? `${FLAGS[selected.champion]||""} ${selected.champion}` : '<span style="color:var(--color-text-tertiary);font-size:14px">— ei valittu —</span>'}</div>
        ${selected.champion && champCount>0 ? `<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:6px">${champCount}/${total} veikkasi näin${champCount>=total*0.6?' 👑 konsensus':''}</div>` : ''}
      </div>

      <div style="margin-top:14px;padding:16px;background:var(--color-background-secondary);border-radius:var(--border-radius-lg)">
        <div class="sec-title" style="margin-top:0"><i class="ti ti-soccer-field" style="font-size:16px;color:var(--pitch-green)"></i>MAALIPÖRSSI · TOP 3</div>
        ${(selected.topScorers||[]).map((p,i) => {
          const m = ["🥇","🥈","🥉"][i];
          if (!p) return `<div style="font-size:13px;color:var(--color-text-tertiary);margin-bottom:6px;padding:8px 12px;background:var(--color-background-primary);border-radius:var(--border-radius-md)">${m} <span style="margin-left:6px">— ei valittu —</span></div>`;
          const goals = selected.topScorerGoals?.[i];
          const cons = tsCounts[i][p] || 0;
          const playerData = PLAYERS.find(pl => pl.n === p);
          return `<div style="font-size:13px;margin-bottom:6px;padding:10px 12px;background:var(--color-background-primary);border-radius:var(--border-radius-md);display:flex;align-items:center;gap:8px">
            <span style="font-size:18px">${m}</span>
            <span style="font-size:16px">${playerData?FLAGS[playerData.c]:""}</span>
            <span style="flex:1;font-weight:500">${p}</span>
            ${goals?`<span class="score-display" style="padding:3px 8px;font-size:13px">${goals} m</span>`:''}
            ${cons>1?`<span style="font-size:10px;color:var(--color-text-tertiary)">${cons}/${total}${cons>=total*0.4?' 👑':''}</span>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function renderByMatch() {
  const s = state;
  return `
    <div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px">
        ${[["ottelut","Ottelut"],["jatko","Jatkoon"],["r32","R32"],["r16","R16"],["qf","QF"],["sf","Finalistit"],["pronssi","Pronssi"],["mestari","Mestari"],["maalit","Maalipörssi"]].map(([k,l])=>`
          <button onclick="state.veikkausSection='${k}';render()" class="subtab-btn ${s.veikkausSection===k?'active':''}">${l}</button>
        `).join('')}
      </div>
      ${s.veikkausSection === 'ottelut' ? renderByMatchOttelut() :
        s.veikkausSection === 'pronssi' ? renderByMatchBronze() :
        s.veikkausSection === 'mestari' ? renderByMatchMestari() :
        s.veikkausSection === 'maalit' ? renderByMatchMaalit() :
        renderByMatchTeamList(s.veikkausSection)}
    </div>
  `;
}

function renderByMatchOttelut() {
  const s = state;
  const matches = ALL_MATCHES.filter(m => m.group === s.veikkausMatchGroup);
  return `
    <div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">
        ${"ABCDEFGHIJKL".split("").map(g=>`<button onclick="state.veikkausMatchGroup='${g}';render()" class="grp-btn${s.veikkausMatchGroup===g?' active':''}">${g}</button>`).join("")}
      </div>
      ${matches.map(m => {
        const picks = s.allPreds.map(p => {
          const pick = p.matches?.[m.id];
          return pick && pick.h !== "" && pick.h !== undefined ? {name: p.name, uid: p.uid, h: pick.h, a: pick.a, sign: sign(pick.h, pick.a)} : null;
        }).filter(Boolean);
        const signCounts = {"1":0,"X":0,"2":0};
        picks.forEach(p => p.sign && signCounts[p.sign]++);
        const consSign = Object.entries(signCounts).sort((a,b)=>b[1]-a[1])[0]?.[0];
        const consCount = signCounts[consSign];
        const isCons = consCount >= picks.length * 0.6;
        return `
          <div style="background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;margin-bottom:8px">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--color-border-tertiary)">
              <span style="font-size:18px">${FLAGS[m.home]}</span>
              <span style="flex:1;font-size:13px;font-weight:500">${m.home} vs ${m.away}</span>
              <span style="font-size:18px">${FLAGS[m.away]}</span>
              ${isCons?`<span class="badge gold">👑 ${consSign} ${consCount}/${picks.length}</span>`:picks.length>0?`<span class="badge">${consSign} ${consCount}/${picks.length}</span>`:''}
            </div>
            ${picks.length===0?`<div style="font-size:12px;color:var(--color-text-tertiary);text-align:center;padding:10px">Ei veikkauksia</div>`:`
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:5px">
                ${picks.map(p => `
                  <div class="pick-card ${p.uid===s.userId?'me':''}${isCons&&p.sign===consSign?' consensus':''}">
                    <span style="flex:1;font-weight:${p.uid===s.userId?500:400};overflow:hidden;text-overflow:ellipsis">${p.name}</span>
                    <span class="score-display" style="padding:2px 6px;font-size:12px">${p.h}-${p.a}</span>
                  </div>
                `).join('')}
              </div>
            `}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderByMatchTeamList(key) {
  const s = state;
  const labels = {advancement:"Jatkoon (32 joukkuetta)", r32:"R32 voittajat (16)", r16:"R16 voittajat (8)", qf:"QF voittajat (4)", sf:"Finalistit (2)"};
  const counts = {};
  s.allPreds.forEach(p => {
    (p[key] || []).forEach(team => {
      if (!counts[team]) counts[team] = [];
      counts[team].push({name: p.name, uid: p.uid});
    });
  });
  const teamsByCount = Object.entries(counts).sort((a,b)=>b[1].length-a[1].length);
  const total = s.allPreds.length;
  return `
    <div>
      <div style="margin-bottom:14px;padding:10px 14px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);border-left:3px solid var(--pitch-green)">
        <div style="font-family:var(--font-sport);font-size:14px;font-weight:600;letter-spacing:0.5px">${labels[key]||key}</div>
        <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:2px">Suosituin valinta ensin · ${total} osallistujaa</div>
      </div>
      ${teamsByCount.length === 0 ? `<p style="text-align:center;color:var(--color-text-tertiary);padding:20px;font-size:13px">Ei valintoja vielä</p>` :
        teamsByCount.map(([team, picks]) => {
          const pct = total > 0 ? Math.round((picks.length / total) * 100) : 0;
          const isCons = pct >= 60;
          const userPicked = picks.some(p => p.uid === s.userId);
          return `
            <div style="background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:5px;${isCons?'border-left:3px solid var(--gold)':userPicked?'border-left:3px solid var(--pitch-green)':''}">
              <div style="display:flex;align-items:center;gap:10px;padding:10px 14px">
                <span style="font-size:18px;min-width:22px">${FLAGS[team]||""}</span>
                <span style="flex:1;font-size:13px;font-weight:500">${team}${isCons?' 👑':''}${userPicked?' <span style="font-size:10px;color:var(--pitch-green);margin-left:4px">· sinä</span>':''}</span>
                <div class="pop-bar"><div class="pop-bar-fill${isCons?' gold':''}" style="width:${pct}%"></div></div>
                <span class="lb-score" style="font-size:14px;min-width:48px;text-align:right">${picks.length}/${total}</span>
              </div>
              <div style="font-size:11px;color:var(--color-text-tertiary);padding:0 14px 8px 46px">
                ${picks.map(p => p.uid===s.userId?`<strong style="color:var(--pitch-green)">${p.name}</strong>`:p.name).join(", ")}
              </div>
            </div>
          `;
        }).join('')
      }
    </div>
  `;
}

function renderByMatchMestari() {
  const s = state;
  const counts = {};
  s.allPreds.forEach(p => { if (p.champion) { if (!counts[p.champion]) counts[p.champion] = []; counts[p.champion].push({name: p.name, uid: p.uid}); } });
  const sorted = Object.entries(counts).sort((a,b)=>b[1].length-a[1].length);
  const total = s.allPreds.length;
  return `
    <div>
      <div style="margin-bottom:14px;padding:10px 14px;background:linear-gradient(135deg,rgba(244,196,48,0.1) 0%,rgba(244,196,48,0.02) 100%);border-radius:var(--border-radius-md);border-left:3px solid var(--gold)">
        <div style="font-family:var(--font-sport);font-size:14px;font-weight:600;letter-spacing:0.5px">🏆 MESTARIVEIKKAUKSET</div>
      </div>
      ${sorted.length === 0 ? `<p style="text-align:center;color:var(--color-text-tertiary);padding:20px;font-size:13px">Ei valintoja vielä</p>` :
        sorted.map(([team, picks]) => {
          const pct = Math.round((picks.length / total) * 100);
          const isCons = pct >= 40;

// ═══════════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════════
window.setTab = t => { state.tab=t; render(); if(t==="taulu") loadBoard(); if(t==="veikkaukset") loadAllPreds(); };
window.setGroup = g => { state.group=g; render(); };
window.setAdminGrp = g => { state.adminGrp=g; render(); };
window.setVeikkausSubtab = t => { state.veikkausSubtab=t; render(); };
window.selectPlayer = uid => { state.selectedPlayerId=uid; render(); };
window.doLogin = async () => {
  if(!state.nameInput.trim()) return;
  const name = state.nameInput.trim();
  // Tarkista löytyykö olemassa oleva käyttäjä samalla nimellä
  const allPreds = await fb.get("predictions");
  let existingUid = null;
  if(allPreds){
    for(const [uid, data] of Object.entries(allPreds)){
      if(data.name && data.name.toLowerCase() === name.toLowerCase()){
        existingUid = uid;
        break;
      }
    }
  }
  if(existingUid){
    // Jatka olemassa olevana käyttäjänä
    try{ await window.storage.set("wc26_uid",existingUid); await window.storage.set("wc26_name",name); }catch{}
    const data = await fb.get(`predictions/${existingUid}`);
    if(data) state.preds = {...EMPTY(),...data};
    state.userId = existingUid; state.userName = name;
  } else {
    // Luo uusi käyttäjä
    const uid = `u_${Date.now()}`;
    try{ await window.storage.set("wc26_uid",uid); await window.storage.set("wc26_name",name); }catch{}
    await fb.set(`predictions/${uid}`,{...EMPTY(),name:name});
    state.userId=uid; state.userName=name;
  }
  render();
};
window.updateMatch = (id,field,val) => {
  if(isLocked()) return;
  const np={...state.preds,matches:{...state.preds.matches,[id]:{...state.preds.matches[id],[field]:val}}};
  state.preds=np; render(); scheduleSave(np);
};
window.toggleList = (key,team,max) => {
  if(isLocked()) return;
  const cur=state.preds[key]||[];
  const upd=cur.includes(team)?cur.filter(t=>t!==team):cur.length<max?[...cur,team]:cur;
  const np={...state.preds,[key]:upd}; state.preds=np; render(); scheduleSave(np);
};
window.setChamp = team => {
  if(isLocked()) return;
  const np={...state.preds,champion:state.preds.champion===team?"":team};
  state.preds=np; render(); scheduleSave(np);
};
window.setBronzeWinner = team => {
  if(isLocked()) return;
  const np={...state.preds,bronzeWinner:state.preds.bronzeWinner===team?"":team};
  state.preds=np; render(); scheduleSave(np);
};
window.setTopScorer = (idx, player) => {
  if(isLocked()) return;
  const ts=[...(state.preds.topScorers||["","",""])]; ts[idx]=player;
  const np={...state.preds, topScorers: ts}; state.preds=np; render(); scheduleSave(np);
};
window.setTopScorerGoals = (idx, goals) => {
  if(isLocked()) return;
  const tg=[...(state.preds.topScorerGoals||["","",""])]; tg[idx]=goals;
  const np={...state.preds, topScorerGoals: tg}; state.preds=np; render(); scheduleSave(np);
};
window.loadBoard = async () => {
  state.boardLoading=true; render();
  const [allPreds,res]=await Promise.all([fb.get("predictions"),fb.get("results")]);
  if(allPreds){ state.board=Object.entries(allPreds).map(([uid,p])=>({name:p.name||"?",score:calcScore(p,res||{}),uid})).sort((a,b)=>b.score-a.score); }
  state.boardLoading=false; render();
};
window.loadAllPreds = async () => {
  state.allPredsLoading=true; render();
  const allPreds = await fb.get("predictions");
  if(allPreds){
    state.allPreds = Object.entries(allPreds)
      .map(([uid,p])=>({uid, ...p}))
      .sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  } else { state.allPreds = []; }
  state.allPredsLoading=false; render();
};
window.tryAdminOpen = () => { if(state.adminPw===ADMIN_PW){state.adminOpen=true;} render(); };
window.adminUpdateMatch = (id,field,val) => { state.adminRes={...state.adminRes,matches:{...state.adminRes.matches,[id]:{...state.adminRes.matches?.[id],[field]:val}}}; render(); };
window.adminToggle = (key,team,max) => { const cur=state.adminRes[key]||[]; const sel=cur.includes(team); if(!sel&&cur.length>=max) return; state.adminRes={...state.adminRes,[key]:sel?cur.filter(t=>t!==team):[...cur,team]}; render(); };
window.adminSetChamp = team => { state.adminRes={...state.adminRes,champion:state.adminRes.champion===team?"":team}; render(); };
window.adminSetBronzeWinner = team => { state.adminRes={...state.adminRes,bronzeWinner:state.adminRes.bronzeWinner===team?"":team}; render(); };
window.adminSetTopScorer = (idx, player) => { const ts=[...(state.adminRes.topScorers||["","",""])]; ts[idx]=player; state.adminRes={...state.adminRes, topScorers: ts}; render(); };
window.adminSetTopScorerGoals = (idx, goals) => { const tg=[...(state.adminRes.topScorerGoals||["","",""])]; tg[idx]=goals; state.adminRes={...state.adminRes, topScorerGoals: tg}; render(); };
window.adminSaveAll = async () => { state.adminSaving=true; render(); await fb.set("results",state.adminRes); state.results={...state.adminRes}; state.adminSaving=false; render(); };
window.loadUsers = async () => {
  const allPreds = await fb.get("predictions");
  if(allPreds){
    state.usersList = Object.entries(allPreds).map(([uid,p])=>({uid, name: p.name||"?", matchCount: Object.values(p.matches||{}).filter(m=>m.h!==undefined&&m.h!=="").length, champion: p.champion||""})).sort((a,b)=>a.name.localeCompare(b.name));
  } else { state.usersList = []; }
  render();
};
window.deleteUserStep1 = (uid) => { state.deleteStep = 1; state.deleteUid = uid; state.deleteConfirmName = ""; render(); };
window.deleteUserStep2 = () => { state.deleteStep = 2; state.deleteConfirmName = ""; render(); };
window.deleteUserCancel = () => { state.deleteStep = 0; state.deleteUid = null; state.deleteConfirmName = ""; render(); };
window.deleteUserConfirm = async () => {
  const user = state.usersList.find(u=>u.uid===state.deleteUid);
  if(!user || state.deleteConfirmName !== user.name) return;
  await fb.del(`predictions/${state.deleteUid}`);
  state.deleteStep = 0; state.deleteUid = null; state.deleteConfirmName = "";
  await window.loadUsers();
};

(async()=>{
  try{
    const uid=await window.storage.get("wc26_uid");
    const uname=await window.storage.get("wc26_name");
    if(uid?.value&&uname?.value){
      state.userId=uid.value; state.userName=uname.value;
      const data=await fb.get(`predictions/${uid.value}`);
      if(data) state.preds={...EMPTY(),...data};
    }
  }catch{}
  const res=await fb.get("results");
  if(res){state.results={...EMPTY(),...res};state.adminRes={...EMPTY(),...res};}
  state.loading=false; render();
})();

function App() { return React.createElement('div', {id: 'app-root'}); }

if (typeof window.storage === 'undefined') {
  try {
    const _ls = window.localStorage;
    window.storage = {
      get: async (k) => { const v=_ls.getItem(k); if(v===null) throw new Error("not found"); return {value:v}; },
      set: async (k,v) => { _ls.setItem(k,String(v)); return {key:k,value:v}; },
      delete: async (k) => { _ls.removeItem(k); return {key:k,deleted:true}; }
    };
  } catch(e) {
    const _store = {};
    window.storage = {
      get: async (k) => { if(_store[k]===undefined) throw new Error("not found"); return {value:_store[k]}; },
      set: async (k,v) => { _store[k]=v; return {key:k,value:v}; },
      delete: async (k) => { delete _store[k]; return {key:k,deleted:true}; }
    };
  }
}

const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(App));
</script>
</body>
</html>
